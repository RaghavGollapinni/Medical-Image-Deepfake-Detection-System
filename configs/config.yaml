# ============================================================
# config.yaml
# Forensic-Aware Medical Deepfake Detection System
# VAC - Healthcare Security Project | PRD v2.0
# ============================================================

# ─── PATHS ───────────────────────────────────────────────────
paths:
  # ── Raw data (absolute paths) ────────────────────────────
  # NIH ChestX-ray14 (not yet downloaded — leave as-is)
  nih_images:         "data/raw/nih/images/"
  nih_labels:         "data/raw/nih/Data_Entry_2017.csv"
  nih_bbox:           "data/raw/nih/BBox_List_2017.csv"

  # CheXpert — CONFIRMED PRESENT (42 GB, 223K+ images)
  chexpert_train:     "data/raw/chexpert/train/"
  chexpert_valid:     "data/raw/chexpert/valid/"
  chexpert_train_csv: "data/raw/chexpert/train.csv"
  chexpert_valid_csv: "data/raw/chexpert/valid.csv"

  # MedForge-90K (not yet downloaded)
  medforge_images:    "data/raw/medforge/images/"
  medforge_masks:     "data/raw/medforge/masks/"
  medforge_labels:    "data/raw/medforge/labels.json"

  # Synthetic deepfakes (generated in Phase 2 — empty until pipeline runs)
  synthetic_injected: "data/synthetic/injected/"
  synthetic_erased:   "data/synthetic/erased/"
  synthetic_subtle:   "data/synthetic/subtle/"

  # Masks (real + generated)
  masks_dir:          "data/masks/"

  # ── Dev subset split CSVs (20K train / 3.3K val / 10K test) ──
  # Generated by: python prepare_dev_subset.py
  train_csv:          "data/splits/train.csv"
  val_csv:            "data/splits/val.csv"
  test_csv:           "data/splits/test.csv"

  # ── Outputs ────────────────────────────────────────────────
  checkpoints:        "/content/drive/MyDrive/MedicalDeepfakeDetect/checkpoints/"
  outputs:            "outputs/"
  logs:               "outputs/logs/"
  heatmaps:           "outputs/heatmaps/"
  reports:            "outputs/reports/"


# ─── DATA ────────────────────────────────────────────────────
data:
  image_size: 224                   # Resize all images to 224x224
  image_channels: 1                 # Grayscale X-rays
  num_workers: 2                    # 2 is safe on Windows (avoids spawn issues)

  # Dataset composition (must sum to 1.0)
  composition:
    authentic:  0.50
    injected:   0.20
    erased:     0.20
    subtle:     0.10

  # Split proportions
  splits:
    train: 0.70
    val:   0.15
    test:  0.15

  # Preprocessing
  clahe:
    enabled:      true
    clip_limit:   2.0
    tile_size:    8                 # 8x8 tile grid

  # ImageNet normalization stats (used for pretrained DenseNet)
  normalization:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

  # Augmentation (training only)
  augmentation:
    horizontal_flip:  true
    rotation_degrees: 15
    gaussian_noise:
      enabled: true
      sigma:   0.01
    autocontrast: true
    zoom:
      enabled: true
      scale_min: 0.90
      scale_max: 1.10
    contrast_variation: false       # Off by default; enable for robustness testing


# ─── MODEL ───────────────────────────────────────────────────
model:
  # Backbone
  backbone:
    name:             "densenet121"
    pretrained:       true
    weights:          "chexnet"     # Options: "chexnet" | "imagenet"
    output_features:  1024          # DenseNet-121 final dense block output

  # FFT-CNN Branch
  fft_branch:
    enabled:          true
    num_layers:       4
    output_dim:       512           # Frequency feature vector size

  # Disease Classification Head
  classification_head:
    hidden_dim:       512
    num_classes:      14
    dropout:          0.3
    classes:
      - "Atelectasis"
      - "Cardiomegaly"
      - "Consolidation"
      - "Edema"
      - "Effusion"
      - "Emphysema"
      - "Fibrosis"
      - "Hernia"
      - "Infiltration"
      - "Mass"
      - "Nodule"
      - "Pleural_Thickening"
      - "Pneumonia"
      - "Pneumothorax"

  # Forgery Detection Head
  forgery_head:
    input_dim:        1536          # 1024 (DenseNet) + 512 (FFT-CNN)
    hidden_dim:       256
    dropout:          0.3

  # Localization Head (U-Net Decoder)
  localization_head:
    upsample_blocks:  4
    output_size:      224           # Must match image_size


# ─── TRAINING ────────────────────────────────────────────────
training:
  seed: 42

  # Phase 1: Warm-up (freeze backbone, train heads only)
  phase1:
    epochs:           3
    learning_rate:    1.0e-3
    freeze_backbone:  true

  # Phase 2: Joint fine-tuning (unfreeze all)
  phase2:
    epochs:           32
    learning_rate:    1.0e-4
    freeze_backbone:  false

  # Phase 3: Stabilization (low LR, fine-tune entire system)
  phase3:
    epochs:           15
    learning_rate:    1.0e-5
    freeze_backbone:  false

  total_epochs:       50            # 3 + 32 + 15
  early_stopping_patience: 5        # Stop if no improvement in 5 epochs

  scheduler:
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 3
    min_lr: 1.0e-7

  early_stopping:
    patience: 7
    min_delta: 0.001

  # Optimizer
  optimizer:
    name:             "adamw"
    weight_decay:     1.0e-4

  # Batch sizes
  batch_size:
    gpu:              16
    cpu:              8

  # Multi-task loss weights
  loss_weights:
    alpha:            1.0           # Disease classification (Focal Loss)
    beta:             2.0           # Forgery detection (increase to counter class imbalance)
    gamma:            0.3           # Localization (Dice + BCE)
    forgery_pos_weight: 10.0        # Weight for manipulated class (authentic:fake ~5:1)

  # Mixed precision
  mixed_precision:    true          # torch.cuda.amp FP16

  # Gradient checkpointing (saves VRAM during training)
  gradient_checkpointing: true

  # Logging
  logging:
    tensorboard:      true
    wandb:            true
    wandb_project:    "medical-deepfake-detector"
    log_every_n_steps: 50
    save_best_by:     "disease_auc" # Metric to select best checkpoint


# ─── TRUST SCORE ─────────────────────────────────────────────
trust_score:
  # Formula: trust = 1.0 - p_manip * (0.5 + 0.5 * overlap)
  base_weight:        0.5
  overlap_weight:     0.5

  # Thresholds for trust labels
  thresholds:
    verified:         0.85          # >= 0.85 -> "Diagnosis Verified"
    caution:          0.70          # 0.70 - 0.85 -> "Proceed with Caution"
    review:           0.00          # < 0.70 -> "Manual Review Recommended"

  labels:
    verified:         "Diagnosis Verified"
    caution:          "Proceed with Caution"
    review:           "Manual Review Recommended / Rescan"


# ─── INFERENCE ───────────────────────────────────────────────
inference:
  checkpoint:         "checkpoints/best_forgery_auc.pt"
  device:             "cuda"        # "cuda" | "cpu"
  max_latency_ms:
    gpu:              500
    cpu:              3000
  output_heatmap:     true
  heatmap_colormap:   "jet"         # cv2 colormap for overlay
  heatmap_alpha:      0.4           # Blend alpha for overlay


# ─── EVALUATION ──────────────────────────────────────────────
evaluation:
  # Target metrics from PRD
  targets:
    diagnosis_auc:    0.85
    forgery_auc:      0.92
    forgery_accuracy: 0.90
    localization_iou: 0.50
    trust_ece:        0.10
    trust_alignment:  0.88

  # IoU threshold for localization
  iou_threshold:      0.50

  # Scenarios (S1-S6)
  scenarios:
    - name: "S1_originals_only"
      description: "Original images only — clean baseline"
    - name: "S2_deepfakes_only"
      description: "Synthetic deepfakes only"
    - name: "S3_mixed"
      description: "50% original, 50% manipulated"
    - name: "S4_subtle_only"
      description: "Subtle manipulations only (intensity < 0.3)"
    - name: "S5_cross_dataset"
      description: "Train NIH, test CheXpert"
    - name: "S6_unseen_gan"
      description: "Zero-shot on unseen GAN architecture"


# ─── HARDWARE ────────────────────────────────────────────────
hardware:
  max_vram_inference_gb:  4.0
  max_vram_training_gb:   6.0
  max_model_size_mb:      120
